<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cicatrices silencieuses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="app" id="app">
      <section class="gate" id="gate" aria-labelledby="gate-title">
        <div class="gate-card">
          <h1 id="gate-title">Avant d’entrer…</h1>
          <p class="gate-sub">Certaines choses ne s’ouvrent qu’avec un souvenir.</p>
          <label for="password" class="sr-only">Mot de passe</label>
          <input id="password" type="password" placeholder="Code à 4 chiffres" autocomplete="off" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" aria-describedby="password-format" />
          <p id="password-format" class="hint">Format : 4 chiffres.</p>
          <p class="hint">Indice : une date que le cœur n’oublie pas.</p>
          <button id="enter-btn" type="button">Entrer</button>
          <p id="gate-error" class="error" role="status" aria-live="polite"></p>
        </div>
      </section>

      <section class="scene hidden" id="scene" aria-label="Expérience poétique">
        <canvas id="bg-canvas" aria-hidden="true"></canvas>
        <div id="word-layer" aria-hidden="true"></div>
        <div class="sphere-wrap" id="sphere-wrap">
          <canvas id="sphere-canvas" width="900" height="900" aria-label="Sphère de verre"></canvas>
          <div class="halo" id="halo"></div>
        </div>
        <div class="overlay-dark" id="overlay-dark"></div>
      </section>

      <section class="ending hidden" id="ending" aria-live="polite">
        <p class="line" id="line-1">Tu savais ce que provoquait chaque clic.</p>
        <p class="line" id="line-2">Tu l’as fait quand même.</p>
        <p class="line final" id="line-3">Certaines blessures ne font pas de bruit.<br />Elles restent.</p>
      </section>
    </main>

    <div class="cursor" id="cursor" aria-hidden="true"></div>

    <script src="script.js"></script>
  </body>
</html>
